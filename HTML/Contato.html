<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JayChouDev | Contato</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/Global.css" />
    <link rel="stylesheet" href="../CSS/MenuBar.css" />
    <link rel="stylesheet" href="../CSS/contatotyle.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Fonte Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Menu Flutuante -->
    <header>
      <nav>
        <div class="logo">
          <a href="../index.html">JayChouDev</a>
        </div>
        <div class="menu-icon">
          <i class="fa-solid fa-bars"></i>
        </div>
        <ul class="nav-links">
          <li><a href="../index.html">Home</a></li>
          <li><a href="Projetos.html">Projetos</a></li>
          <li><a href="Contato.html" class="active">Contato</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="contact-container">
        <div class="contact-info">
          <h1>Entre em Contato</h1>
          <p>
            Estou sempre aberto a novas oportunidades, colaborações e ideias. Sinta-se à vontade para entrar em contato através do formulário ou pelas minhas redes.
          </p>
          <div class="info-item">
            <i class="fa-solid fa-envelope"></i>
            <span>kauamedeirosmh@gmail.com</span>
          </div>
          <div class="info-item">
            <i class="fa-brands fa-linkedin"></i>
            <a href="https://www.linkedin.com/in/kauã-medeiros-honorato-3495a0344/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          </div>
          <div class="info-item">
            <i class="fa-brands fa-github"></i>
            <a href="https://github.com/JayChouDev" target="_blank" rel="noopener noreferrer">GitHub</a>
          </div>
          <div class="social-links">
            <a href="https://www.tiktok.com/@jaychoudev" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
              <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="https://www.instagram.com/jaychoudev/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
              <i class="fa-brands fa-instagram"></i>
            </a>
          </div>
        </div>
        <div class="contact-form">
          <h2>Envie uma Mensagem</h2>
          <!--
            INSTRUÇÕES PARA O FORMULÁRIO DE CONTATO:
            1. Crie uma conta no site https://formspree.io/
            2. Crie um novo formulário e substitua a URL abaixo pela URL do seu formulário.
            3. O Formspree enviará os dados do formulário para o seu e-mail.
          -->
          <form id="contact-form" action="https://formspree.io/f/xwpajzle" method="POST">
            <div class="form-group">
              <label for="name">Nome</label>
              <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="message">Mensagem</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Enviar</button>
          </form>
          <div id="form-status"></div>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 JayChouDev.</p>
    </footer>

    <script src="../menu.js"></script>
    <script>
      // Script do formulário de contato
      const form = document.getElementById("contact-form");
      const status = document.getElementById("form-status");

      async function handleSubmit(event) {
        event.preventDefault();
        const data = new FormData(event.target);
        fetch(event.target.action, {
          method: form.method,
          body: data,
          headers: {
            'Accept': 'application/json'
          }
        }).then(response => {
          if (response.ok) {
            status.innerHTML = "Obrigado por sua mensagem! Responderei em breve.";
            form.reset();
          } else {
            response.json().then(data => {
              if (Object.hasOwn(data, 'errors')) {
                status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
              } else {
                status.innerHTML = "Oops! Houve um problema ao enviar seu formulário.";
              }
            });
          }
        }).catch(error => {
          status.innerHTML = "Oops! Houve um problema ao enviar seu formulário.";
        });
      }
      form.addEventListener("submit", handleSubmit);

      // Script do card de e-mail (se ainda existir na página)
      const emailCard = document.getElementById("email-card");
      if (emailCard) {
        const tooltip = emailCard.querySelector(".tooltip");
        emailCard.addEventListener("click", () => {
          const email = emailCard.getAttribute("data-email");
          navigator.clipboard.writeText(email).then(() => {
            tooltip.textContent = "E-mail Copiado!";
            setTimeout(() => {
              tooltip.textContent = "Clique para copiar";
            }, 2000);
          });
        });
      }
    </script>
  </body>
</html>
