<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JayChouDev | Projetos</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../CSS/MenuBar.css" />
  <link rel="stylesheet" href="../CSS/ProjetosStyle.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Fonte Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Menu -->
  <div id="menu"></div>

  <!-- Main -->
  <main>
    <section id="projetos">
      <div class="container-principal">
        <h2>Meus Projetos Pessoais</h2>
        <div class="grade-projetos">

          <!-- Card 1 -->
          <div class="mini-card">
            <a href="https://chat-bot-jay.vercel.app" target="_blank" rel="noopener noreferrer">
              <img src="../Print-Icone/PrintChatBot.png" alt="ChatBot com API da Punter" />
            </a>
            <h3>ChatBot</h3>
            <p>Projeto com <span class="destaque">API da Punter</span></p>
            <a href="https://chat-bot-jay.vercel.app" target="_blank" class="btn">Ver Projeto</a>
          </div>

          <!-- Card 2 -->
          <div class="mini-card">
            <a href="https://bio-profile-jay-chou-dev.vercel.app" target="_blank">
              <img src="../Print-Icone/PrintBio.png" alt="Mini Portfólio" />
            </a>
            <h3>Mini Portfólio</h3>
            <p>HTML & CSS puro</p>
            <a href="https://bio-profile-jay-chou-dev.vercel.app" target="_blank" class="btn">Ver Projeto</a>
          </div>

          <!-- Card 3 -->
          <div class="mini-card">
            <a href="https://task-nine-opal.vercel.app" target="_blank">
              <img src="../Print-Icone/PrintKanban.png" alt="Kanban de Estudos" />
            </a>
            <h3>Kanban</h3>
            <p>Organização de estudos</p>
            <a href="https://task-nine-opal.vercel.app" target="_blank" class="btn">Ver Projeto</a>
          </div>

          <!-- Card 4 -->
          <div class="mini-card">
            <a href="https://imcjs-beta.vercel.app" target="_blank">
              <img src="../Print-Icone/PrintIMC.png" alt="Calculadora de IMC" />
            </a>
            <h3>IMC</h3>
            <p>Calculadora de Índice de Massa Corporal</p>
            <a href="https://imcjs-beta.vercel.app" target="_blank" class="btn">Ver Projeto</a>
          </div>

        </div>
      </div>
    </section>
  </main>

  <!-- Script Menu -->
  <script>
    fetch("../HTML/Menu.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("menu").innerHTML = data;
        const links = document.querySelectorAll("#menu nav a");
        links.forEach(link => {
          if (link.href === window.location.href) link.classList.add("active");
        });
      });
  </script>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 JayChouDev.</p>
  </footer>

</body>
</html>
